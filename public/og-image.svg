        font-family: "Miss Katherine Cyrillic Script";
        src: url("fonts/miss-katherine-cyrillic.woff2") format("woff2");
      }

      .serif {
        font-family: "Oranienbaum", Georgia, serif;
      }

      .script {
        font-family: "Miss Katherine Cyrillic Script", cursive;
      }
    </style>
    <linearGradient id="paperGlow" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fbfaf5" />
      <stop offset="0.55" stop-color="#f6f1e9" />
      <stop offset="1" stop-color="#fbfaf5" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#7b8a5f" />
  <image href="assets/ornate-frame.webp" x="-18" y="-250" width="1236" height="1740" opacity="0.46" preserveAspectRatio="xMidYMid slice" />
  <rect x="84" y="54" width="1032" height="522" rx="0" fill="url(#paperGlow)" opacity="0.94" />
  <image href="assets/envelope-front-adz.png" x="0" y="-188" width="1200" height="746" opacity="0.2" preserveAspectRatio="xMidYMin meet" />

  <text class="serif" x="600" y="168" fill="#593b00" text-anchor="middle" font-size="46" letter-spacing="1">
